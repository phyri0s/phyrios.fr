title: Dorian PESCE - Développeur Full Stack
markdown: kramdown
# url: ""
# baseurl: "/jekyll-theme-material-you"

# for atom feed
author:
  name: Dorian PESCE
  email: dev@phyrios.fr

plugins:
  - jemoji
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

collections_dir: all_collections
collections:
  projects:
    output: true
  posts:
    output: true

defaults:
  - scope:
      path: "_posts"
    values:
      layout: "post"
      permalink: /posts/:title/
  - scope:
      path: "_projects"
    values:
      layout: "project"
      permalink: /projects/:title/
exclude: ["sitemap.xml", "feed.xml", "LICENSE", "README.md"]
